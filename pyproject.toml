[tool.pytest.ini_options]
# Tests live in tests/. They may import QtCore-based modules (udp_handler,
# mqtt_client, hunt_manager) — QObject/pyqtSignal work headless with signals
# connected DirectConnection. No QtWidgets / QApplication anywhere: PyQt UI
# testing would require pytest-qt and a display server; that's deferred.
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",                # Show summary of all non-passing outcomes
    "--strict-markers",   # Unknown @pytest.mark.X is an error, not a typo
]
